<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Rhythm Game Portal - Launch and play the ultimate rhythm game experience">
    <meta name="theme-color" content="#3820ab">
    <title>Rhythm Portal | Launch Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/portal.css">
    <link rel="shortcut icon" type="image/png" href="https://img.icons8.com/dusk/50/ecf0f1/musical-notes.png">
</head>
<body>
    <div class="particle-bg" id="particleBg"></div>

    <div class="portal-container">
        <div class="portal-card">
            <div class="card-accent"></div>
            
            <div class="logo-section">
                <div class="icon-animation">🎵</div>
                <h1 class="game-title">Rhythm</h1>
                <p class="tagline">Test Your Timing. Feel The Beat.</p>
            </div>

            <div class="stats-row">
                <div class="stat">
                    <div class="stat-number">7</div>
                    <div class="stat-label">Keys</div>
                </div>
                <div class="stat">
                    <div class="stat-number">56</div>
                    <div class="stat-label">Seconds</div>
                </div>
                <div class="stat">
                    <div class="stat-number">3</div>
                    <div class="stat-label">Speeds</div>
                </div>
            </div>

            <div class="info-block">
                <div class="song-title">
                    <span>🎧</span> Your Name OST
                </div>
                <div class="song-name">Kataware Doki - Piano Synthesia</div>
                <div class="composer">Composed by Yojiro Noda | Piano by Theishter</div>
            </div>

            <div class="controls-preview">
                <div class="preview-label">⌨️ CONTROLS</div>
                <div class="key-row">
                    <div class="preview-key key-blue">S</div>
                    <div class="preview-key key-red">D</div>
                    <div class="preview-key key-blue">F</div>
                    <div class="preview-key key-orange">␣</div>
                    <div class="preview-key key-blue">J</div>
                    <div class="preview-key key-red">K</div>
                    <div class="preview-key key-blue">L</div>
                </div>
            </div>

            <a href="game.html" class="launch-btn" id="launchBtn">
                <span class="btn-text">Launch Game</span>
                <span class="btn-icon">▶</span>
            </a>

            <div class="portal-footer">
                <p>Made with <span class="heart">❤</span> for rhythm lovers</p>
            </div>
        </div>
    </div>

    <script src="js/portal.js"></script>
</body>
</html>
